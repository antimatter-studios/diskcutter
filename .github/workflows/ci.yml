# Disk Cutter CI gate.
#
# This workflow is the agreed CI bar for PRs and pushes to main. It mirrors
# .githooks/pre-commit (cargo fmt, cargo clippy -D warnings, i18n parity)
# and additionally runs the full test suites and the frontend production
# build. A green CI run here means the same checks that pass locally on a
# pre-commit also pass on a clean Linux/macOS/Windows runner.
#
# We deliberately do not exercise the macOS DiskArbitration FFI, the
# Linux udev path, or Windows PowerShell disk enumeration against real
# devices — those require physical disks or sandboxing tricks that
# don't belong in CI. `cargo test` is enough; the unit tests don't
# touch real /dev/ nodes or \\.\PhysicalDriveN handles.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-checks:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            patchelf \
            build-essential \
            file

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # `tauri::generate_context!()` checks `frontendDist` exists at
      # compile time. Without devUrl set in tauri.conf.json (which is the
      # standing project decision — single supported run-mode), every
      # cargo invocation that compiles the lib needs `dist/` on disk.
      # Build the frontend bundle once before clippy + test.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm install
        run: npm install

      - name: Frontend build (produces dist/ for tauri::generate_context!)
        run: npm run build

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: npm install
        run: npm install

      - name: Vitest
        run: npm test

      - name: Production build
        run: npm run build

      - name: i18n key parity
        run: node scripts/check-i18n.mjs
