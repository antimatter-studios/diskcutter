name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'src-tauri/catalog.json'
      - 'src-tauri/catalog.schema.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stage catalog alongside website
        run: |
          # Single source of truth lives in src-tauri/. The site is
          # the public mirror the app fetches from at
          # https://diskcutter.app/catalog.json.
          cp src-tauri/catalog.json website/catalog.json
          cp src-tauri/catalog.schema.json website/catalog.schema.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - id: deploy
        uses: actions/deploy-pages@v4
