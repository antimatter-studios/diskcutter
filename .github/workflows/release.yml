name: Release

on:
  push:
    tags:
      # CalVer: YYYY.M(M).D(D) with optional `v` prefix and optional suffix
      # (e.g. 2026.5.12, v2026.05.12, 2026.5.12-rc1)
      - '20[0-9][0-9].*.*'
      - 'v20[0-9][0-9].*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (universal)
            platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - label: Linux (x86_64)
            platform: ubuntu-22.04
            rust-targets: ''
            args: ''
          - label: Windows (x86_64)
            platform: windows-latest
            rust-targets: ''
            # NSIS only — MSI's ProductVersion caps the major component
            # at 255, which makes our YYYY.M.D CalVer (2026.…)
            # unrepresentable. NSIS accepts arbitrary version strings.
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            patchelf \
            build-essential \
            file

      - run: npm ci

      - name: Strip macOS signing config when no cert secret
        # tauri.conf.json hardcodes the Developer ID identity for
        # convenient local builds, but CI has no matching cert in its
        # keychain unless APPLE_CERTIFICATE is provided. When the
        # secret is absent, drop the signing section so the build
        # produces an unsigned .app instead of failing with
        # "The specified item could not be found in the keychain."
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE == ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          python3 - <<'EOF'
          import json, pathlib
          p = pathlib.Path("src-tauri/tauri.conf.json")
          c = json.loads(p.read_text())
          c.get("bundle", {}).pop("macOS", None)
          p.write_text(json.dumps(c, indent=2) + "\n")
          print("Stripped bundle.macOS — CI build will be unsigned")
          EOF

      - name: Build & upload (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization. tauri-action imports the
          # cert into a temp keychain when APPLE_CERTIFICATE is set,
          # then stapling kicks in automatically when the notarization
          # triple is also present. Until the secrets are populated
          # the previous step strips signing from the config so the
          # CI build produces an unsigned .app (requires right-click
          # → Open on first launch on other Macs).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Only attach to a release when triggered by a tag push.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Disk Cutter {0}', github.ref_name) || '' }}
          releaseBody: |
            Automated build for `${{ github.ref_name }}`.
            Download the installer for your platform below.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
